<!DOCTYPE html>
<html>
<head>
  <title>Auth App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(to right, #667eea, #764ba2);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .btn-custom {
      background-color: #667eea;
      color: white;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5">

      <div class="card p-4 mb-4" id="authSection">

        <div class="d-flex mb-3">
          <button id="loginBtn" class="btn btn-primary w-50" onclick="showLogin()">Login</button>
          <button id="signupBtn" class="btn btn-outline-primary w-50" onclick="showSignup()">Signup</button>
        </div>

        <div id="loginForm">
          <input id="li_user" class="form-control mb-2" placeholder="Username">
          <input id="li_pass" type="password" class="form-control mb-2" placeholder="Password">
          <button class="btn btn-success w-100" onclick="login()">Login</button>
        </div>

        <div id="signupForm" style="display:none;">
          <input id="su_user" class="form-control mb-2" placeholder="Username">
          <input id="su_pass" type="password" class="form-control mb-2" placeholder="Password">
          <button class="btn btn-custom w-100" onclick="signup()">Signup</button>
        </div>

      </div>

      <div class="card p-4" id="profileSection" style="display:none;">
        <h4 class="text-center">Profile</h4>

        <button class="btn btn-info w-100 mb-2" onclick="getProfile()">Get Profile</button>

        <input id="role" class="form-control mb-2" placeholder="Role">
        <input id="location" class="form-control mb-2" placeholder="Location">
        <input id="company" class="form-control mb-2" placeholder="Company">

        <button class="btn btn-warning w-100" onclick="updateProfile()">Update Profile</button>
        <button class="btn btn-danger w-100 mt-2" onclick="logout()">Logout</button>
      </div>

      <!-- OUTPUT -->
      <div class="card p-3 mt-3">
        <div id="output"></div>
      </div>

    </div>
  </div>
</div>

<script>
const BASE_URL = "https://login-signup-page-3-xjke.onrender.com";
let token = "";

// Toggle Login
function showLogin() {
  document.getElementById("loginForm").style.display = "block";
  document.getElementById("signupForm").style.display = "none";

  loginBtn.classList.add("btn-primary");
  loginBtn.classList.remove("btn-outline-primary");

  signupBtn.classList.add("btn-outline-primary");
  signupBtn.classList.remove("btn-primary");
}

// Toggle Signup
function showSignup() {
  document.getElementById("loginForm").style.display = "none";
  document.getElementById("signupForm").style.display = "block";

  signupBtn.classList.add("btn-primary");
  signupBtn.classList.remove("btn-outline-primary");

  loginBtn.classList.add("btn-outline-primary");
  loginBtn.classList.remove("btn-primary");
}

// Signup
function signup() {
  const username = document.getElementById('su_user').value.trim();
  const password = document.getElementById('su_pass').value.trim();

  if (!username || !password) {
    output({ msg: "Username and Password required" });
    return;
  }

  fetch(`${BASE_URL}/signup`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ username, password })
  })
  .then(res => res.json())
  .then(data => output(data))
  .catch(() => output({ msg: "Signup failed" }));
}

// Login
function login() {
  fetch(`${BASE_URL}/login`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      username: document.getElementById('li_user').value,
      password: document.getElementById('li_pass').value
    })
  })
  .then(res => res.json())
  .then(data => {
    if (data.access_token) {
      token = data.access_token;

      output({ msg: "Login successful" });

      document.getElementById("profileSection").style.display = "block";
      document.getElementById("authSection").style.display = "none";
    } else {
      output(data);
    }
  });
}

// Get Profile
function getProfile() {
  fetch(`${BASE_URL}/profile`, {
    headers: { 'Authorization': 'Bearer ' + token }
  })
  .then(res => res.json())
  .then(data => output(data));
}

// Update Profile
function updateProfile() {
  if (!token) {
    output({ msg: "Login first" });
    return;
  }

  fetch(`${BASE_URL}/profile`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + token
    },
    body: JSON.stringify({
      role: document.getElementById('role').value,
      location: document.getElementById('location').value,
      company: document.getElementById('company').value
    })
  })
  .then(res => res.json())
  .then(data => output(data));
}

// Logout
function logout() {
  token = "";

  document.getElementById("profileSection").style.display = "none";
  document.getElementById("authSection").style.display = "block";

  li_user.value = "";
  li_pass.value = "";
  su_user.value = "";
  su_pass.value = "";
  role.value = "";
  location.value = "";
  company.value = "";

  showLogin();

  output({ msg: "Logged out successfully" });
}

// Output
function output(data) {
  let html = "";

  if (data.msg) {
    html = `<div class="alert alert-info">${data.msg}</div>`;
  } else {
    html = `
      <b>Username:</b> ${data.username || ""}<br>
      <b>Role:</b> ${data.role || ""}<br>
      <b>Location:</b> ${data.location || ""}<br>
      <b>Company:</b> ${data.company || ""}
    `;
  }

  document.getElementById('output').innerHTML = html;
}
</script>

</body>
</html>
